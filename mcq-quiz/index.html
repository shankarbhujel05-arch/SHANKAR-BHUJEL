<!DOCTYPE html>
<html lang="en">
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCQ — BY Er. Shankar Bhujel</title>

  <!-- ─── Google Fonts ─────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════════════════════
       CSS VARIABLES — Global color system
    ═══════════════════════════════════════════════════════════════ */
    :root {
      --bg:           #0f1117;      /* Page background */
      --surface:      #1a1d27;      /* Card background */
      --surface2:     #232638;      /* Slightly lighter card */
      --border:       #2e3149;      /* Default borders */
      --accent:       #6c63ff;      /* Primary purple accent */
      --accent-hover: #5a52e0;      /* Accent on hover */
      --accent-glow:  rgba(108,99,255,0.25); /* Glow effect */
      --text:         #e8eaf0;      /* Main text */
      --muted:        #7b80a0;      /* Subdued text */
      --correct:      #22c55e;      /* Green — correct answer */
      --correct-bg:   rgba(34,197,94,0.12);
      --wrong:        #ef4444;      /* Red — wrong answer */
      --wrong-bg:     rgba(239,68,68,0.12);
      --neutral:      #374151;      /* Default option */
      --gold:         #f59e0b;      /* Timer & score highlight */
      --radius:       12px;
      --radius-sm:    8px;
    }

    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ─── Scrollbar ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ═══════════════════════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════════════════════ */
    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .header-logo span.dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px var(--accent);
    }
    .header-by {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* ─── Live stats bar (shown during quiz) ─────────────────── */
    .quiz-stats-bar {
      display: none; /* hidden until quiz starts */
      align-items: center;
      gap: 1.5rem;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
    }
    .stat-chip .icon { font-size: 0.9rem; }
    .stat-chip.score-chip { color: var(--correct); }
    .stat-chip.timer-chip { color: var(--gold); font-family: 'DM Mono', monospace; }

    /* ═══════════════════════════════════════════════════════════════
       MAIN LAYOUT
    ═══════════════════════════════════════════════════════════════ */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ═══════════════════════════════════════════════════════════════
       SCREEN: QUIZ SELECTION (Home Screen)
    ═══════════════════════════════════════════════════════════════ */
    #screen-home {
      animation: fadeIn 0.4s ease;
    }
    .home-hero {
      text-align: center;
      padding: 3rem 0 2.5rem;
    }
    .home-hero h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a89bff, #6c63ff, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .home-hero p {
      color: var(--muted);
      font-size: 1rem;
    }

    /* Load button */
    .load-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.7rem 1.8rem;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .load-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 24px var(--accent-glow);
    }

    /* Quiz grid */
    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    /* Each quiz card */
    .quiz-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .quiz-card::before {
      /* Subtle gradient strip at top */
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), #4facfe);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .quiz-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(108,99,255,0.15);
    }
    .quiz-card:hover::before { opacity: 1; }
    .quiz-card .icon { font-size: 2rem; margin-bottom: 0.6rem; }
    .quiz-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
    .quiz-card p { font-size: 0.8rem; color: var(--muted); line-height: 1.4; }
    .quiz-card .q-count {
      margin-top: 0.8rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
    }

    /* Section label */
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    /* Error/info message */
    .msg-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      color: var(--muted);
      font-size: 0.875rem;
      text-align: center;
    }
    .msg-box.error { border-color: var(--wrong); color: var(--wrong); }

    /* ═══════════════════════════════════════════════════════════════
       SCREEN: QUIZ (Active question display)
    ═══════════════════════════════════════════════════════════════ */
    #screen-quiz { display: none; animation: fadeIn 0.3s ease; }

    /* Top meta row: progress + question counter */
    .quiz-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .quiz-title-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .q-counter {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* Progress bar */
    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #4facfe);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Question card */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem 1.6rem;
      margin-bottom: 1rem;
    }
    .question-text {
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.65;
      margin-bottom: 1.4rem;
    }

    /* Answer options */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .option-btn {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      text-align: left;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      width: 100%;
    }
    .option-btn:not(.locked):hover {
      border-color: var(--accent);
      background: rgba(108,99,255,0.08);
      transform: translateX(3px);
    }
    .option-btn .opt-letter {
      min-width: 28px; height: 28px;
      background: var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    /* Correct state */
    .option-btn.correct {
      border-color: var(--correct);
      background: var(--correct-bg);
      color: var(--correct);
    }
    .option-btn.correct .opt-letter { background: var(--correct); color: #fff; }

    /* Wrong state */
    .option-btn.wrong {
      border-color: var(--wrong);
      background: var(--wrong-bg);
      color: var(--wrong);
    }
    .option-btn.wrong .opt-letter { background: var(--wrong); color: #fff; }

    /* Locked — no pointer events */
    .option-btn.locked { cursor: default; }

    /* Explanation box */
    .explanation-box {
      display: none; /* shown after answering */
      margin-top: 1rem;
      background: rgba(108,99,255,0.07);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 0.85rem 1rem;
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.55;
      animation: slideDown 0.25s ease;
    }
    .explanation-box strong {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    /* Navigation buttons */
    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .nav-btn:hover { border-color: var(--accent); background: var(--surface2); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      margin-left: auto;
    }
    .nav-btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    /* "Finish" button shown on last question */
    .nav-btn.finish { background: var(--correct); border-color: var(--correct); color: #fff; }
    .nav-btn.finish:hover { background: #16a34a; border-color: #16a34a; }

    /* Back to home button */
    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.45rem 1rem;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--text); }

    /* ═══════════════════════════════════════════════════════════════
       SCREEN: RESULTS (Summary after completion)
    ═══════════════════════════════════════════════════════════════ */
    #screen-results { display: none; animation: fadeIn 0.4s ease; }

    .results-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      text-align: center;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .results-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #6c63ff, #22c55e, #4facfe);
    }
    .results-emoji { font-size: 3.5rem; margin-bottom: 0.75rem; }
    .results-card h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .results-card .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

    /* Stat grid in results */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      max-width: 400px;
      margin: 0 auto 1.5rem;
    }
    .stat-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
    }
    .stat-box .val {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      margin-bottom: 0.15rem;
    }
    .stat-box .val.green { color: var(--correct); }
    .stat-box .val.gold { color: var(--gold); }
    .stat-box .val.red { color: var(--wrong); }
    .stat-box .lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

    /* Actions row */
    .actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .act-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0.65rem 1.4rem;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: none;
    }
    .act-btn:hover { transform: translateY(-1px); }
    .act-btn.primary { background: var(--accent); color: #fff; box-shadow: 0 0 16px var(--accent-glow); }
    .act-btn.primary:hover { background: var(--accent-hover); }
    .act-btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .act-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }
    .act-btn.success { background: var(--correct); color: #fff; }
    .act-btn.success:hover { background: #16a34a; }
    .act-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Mistakes review list */
    .mistakes-section { margin-top: 1.5rem; }
    .mistake-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--wrong);
      border-radius: var(--radius-sm);
      padding: 1rem 1.1rem;
      margin-bottom: 0.75rem;
      text-align: left;
    }
    .mistake-item .mq { font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
    .mistake-item .ma {
      font-size: 0.78rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.4rem;
    }
    .badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge.wrong { background: var(--wrong-bg); color: var(--wrong); }
    .badge.correct { background: var(--correct-bg); color: var(--correct); }
    .mistake-item .mex {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.4rem;
      padding-top: 0.4rem;
      border-top: 1px solid var(--border);
    }

    /* ═══════════════════════════════════════════════════════════════
       ANIMATIONS
    ═══════════════════════════════════════════════════════════════ */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════════════════════════
       RESPONSIVE — Mobile
    ═══════════════════════════════════════════════════════════════ */
    @media (max-width: 600px) {
      .site-header { padding: 0 1rem; }
      .main { padding: 1.5rem 1rem 3rem; }
      .home-hero h1 { font-size: 1.7rem; }
      .question-card { padding: 1.2rem 1rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .quiz-stats-bar { gap: 0.75rem; }
      .stat-chip { padding: 3px 9px; font-size: 0.78rem; }
      .nav-row { gap: 0.5rem; }
      .nav-btn { padding: 0.55rem 0.85rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════
       HEADER — always visible
  ═══════════════════════════════════════════════════════════════ -->
  <header class="site-header">
    <div class="header-logo">
      <span class="dot"></span>
      MCQ
      <span class="header-by">BY Er. Shankar Bhujel</span>
    </div>

    <!-- These stats show during a quiz -->
    <div class="quiz-stats-bar" id="statsBar">
      <div class="stat-chip score-chip">
        <span class="icon">✓</span>
        <span id="headerScore">0 / 0</span>
      </div>
      <div class="stat-chip timer-chip">
        <span class="icon">⏱</span>
        <span id="headerTimer">00:00</span>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════════════
       MAIN CONTENT AREA
  ═══════════════════════════════════════════════════════════════ -->
  <main class="main">

    <!-- ─── SCREEN: HOME (Quiz selection) ─────────────────────── -->
    <div id="screen-home">
      <div class="home-hero">
        <h1>📋 MCQ</h1>
        <p>Select a quiz below, or load quizzes from your JSON files.</p>
        <button class="load-btn" onclick="loadQuizList()">
          ⚡ Load Questions
        </button>
      </div>

      <!-- Quiz list appears here after loading -->
      <div id="quizListContainer"></div>
    </div>

    <!-- ─── SCREEN: QUIZ (Active quiz) ────────────────────────── -->
    <div id="screen-quiz">
      <!-- Top row: quiz name + back button -->
      <div class="quiz-meta">
        <div>
          <div class="quiz-title-label" id="quizTitleLabel">Quiz</div>
        </div>
        <div style="display:flex; gap:0.5rem; align-items:center;">
          <span class="q-counter" id="qCounter">Question 1 / 10</span>
          <button class="back-btn" onclick="confirmExit()">✕ Exit</button>
        </div>
      </div>

      <!-- Progress bar showing how far through the quiz -->
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>

      <!-- The question card -->
      <div class="question-card">
        <div class="question-text" id="questionText">Loading...</div>
        <div class="options-grid" id="optionsGrid">
          <!-- Options are injected here by JS -->
        </div>
        <!-- Explanation shows after answering -->
        <div class="explanation-box" id="explanationBox">
          <strong>💡 Explanation</strong>
          <span id="explanationText"></span>
        </div>
      </div>

      <!-- Previous / Next navigation -->
      <div class="nav-row">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>
          ← Previous
        </button>
        <button class="nav-btn primary" id="nextBtn" onclick="navigate(1)">
          Next →
        </button>
      </div>
    </div>

    <!-- ─── SCREEN: RESULTS (Quiz completed summary) ──────────── -->
    <div id="screen-results">
      <div class="results-card">
        <div class="results-emoji" id="resultsEmoji">🎉</div>
        <h2>Quiz Completed!</h2>
        <p class="sub" id="resultsSubtitle">Here's how you did</p>

        <!-- Four key stats -->
        <div class="stats-grid">
          <div class="stat-box">
            <div class="val green" id="rScore">—</div>
            <div class="lbl">Score</div>
          </div>
          <div class="stat-box">
            <div class="val gold" id="rTime">—</div>
            <div class="lbl">Time Taken</div>
          </div>
          <div class="stat-box">
            <div class="val" id="rAccuracy">—</div>
            <div class="lbl">Accuracy</div>
          </div>
          <div class="stat-box">
            <div class="val red" id="rMistakes">—</div>
            <div class="lbl">Mistakes</div>
          </div>
        </div>

        <!-- Action buttons -->
        <div class="actions-row">
          <button class="act-btn primary" onclick="retakeQuiz()">🔄 Retake Quiz</button>
          <button class="act-btn success" id="exportBtn" onclick="exportMistakes()">⬇ Export Mistakes</button>
          <button class="act-btn secondary" onclick="goHome()">🏠 Home</button>
        </div>
      </div>

      <!-- Show mistakes review if any exist -->
      <div class="mistakes-section" id="mistakesSection" style="display:none;">
        <div class="section-label">Review Your Mistakes</div>
        <div id="mistakesList"></div>
      </div>
    </div>

  <div class="back-link">
    <a href="../index.html">← Back to Portfolio</a>
  </div>

  </main><!-- /main -->

  <!-- ═══════════════════════════════════════════════════════════════
       JAVASCRIPT — All quiz logic
  ═══════════════════════════════════════════════════════════════ -->
  <script>

    // ─── Option letters A, B, C, D ───────────────────────────────
    const LETTERS = ['A', 'B', 'C', 'D'];

    // ─── Quiz state variables ─────────────────────────────────────
    let quizData        = null;   // The full loaded JSON object
    let questions       = [];     // Array of question objects
    let currentQ        = 0;      // Index of current question (0-based)
    let score           = 0;      // Number of correct answers
    let wrongQuestions  = [];     // Array of incorrectly answered questions
    let userAnswers     = [];     // Stores user's answer index per question (-1 = unanswered)
    let timerInterval   = null;   // setInterval handle for the timer
    let elapsedSeconds  = 0;      // Total seconds elapsed
    let quizFileName    = '';     // Original file name (for export naming)
    let quizTitle       = '';     // Human-readable title of quiz

    // ─── Screen management helpers ────────────────────────────────

    // Show one screen and hide the others
    function showScreen(id) {
      ['screen-home', 'screen-quiz', 'screen-results'].forEach(s => {
        document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
      });
      // Toggle stats bar visibility (only during quiz)
      document.getElementById('statsBar').style.display = (id === 'screen-quiz') ? 'flex' : 'none';
    }

    // ─── Format seconds as MM:SS ─────────────────────────────────
    function formatTime(secs) {
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    // ─── Start the timer ──────────────────────────────────────────
    function startTimer() {
      stopTimer(); // clear any existing timer
      elapsedSeconds = 0;
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        elapsedSeconds++;
        updateTimerDisplay();
      }, 1000);
    }

    // ─── Stop the timer ───────────────────────────────────────────
    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    // ─── Update the timer shown in the header ─────────────────────
    function updateTimerDisplay() {
      document.getElementById('headerTimer').textContent = formatTime(elapsedSeconds);
    }

    // ─── Update the score shown in the header ─────────────────────
    function updateScoreDisplay() {
      document.getElementById('headerScore').textContent = `${score} / ${questions.length}`;
    }

    // ═══════════════════════════════════════════════════════════════
    //  LOAD QUIZ LIST — fetches quizzes.json manifest
    // ═══════════════════════════════════════════════════════════════
    async function loadQuizList() {
      const container = document.getElementById('quizListContainer');
      container.innerHTML = `<div class="msg-box">Loading available quizzes...</div>`;

      try {
        // Fetch the manifest file that lists all available quizzes
        const res = await fetch('quizzes.json');
        if (!res.ok) throw new Error('Could not load quizzes.json');
        const manifest = await res.json();

        if (!manifest.quizzes || manifest.quizzes.length === 0) {
          container.innerHTML = `<div class="msg-box">No questions available.</div>`;
          return;
        }

        // Build the quiz selection grid
        let html = `<div class="section-label">Available Quizzes</div><div class="quiz-grid">`;
        for (const quiz of manifest.quizzes) {
          // We'll show question count after loading but for now show the card
          html += `
            <div class="quiz-card" onclick="selectQuiz('${quiz.file}', '${escapeAttr(quiz.title)}', '${quiz.id}')">
              <div class="icon">${quiz.icon || '📋'}</div>
              <h3>${escapeHtml(quiz.title)}</h3>
              <p>${escapeHtml(quiz.description || '')}</p>
              <div class="q-count">Click to start →</div>
            </div>`;
        }
        html += `</div>`;
        container.innerHTML = html;

      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="msg-box error">⚠ Unable to load questions.<br>Please check that quizzes.json exists and try again.</div>`;
      }
    }

    // ═══════════════════════════════════════════════════════════════
    //  SELECT QUIZ — loads the chosen JSON file and starts the quiz
    // ═══════════════════════════════════════════════════════════════
    async function selectQuiz(filePath, title, fileId) {
      try {
        const res = await fetch(filePath);
        if (!res.ok) throw new Error(`Could not load: ${filePath}`);
        const data = await res.json();

        if (!data.questions || data.questions.length === 0) {
          alert('No questions available in this quiz.');
          return;
        }

        // Store quiz data in global variables
        quizData       = data;
        questions      = data.questions;
        quizTitle      = title;
        quizFileName   = fileId;

        // Reset all quiz state for a fresh start
        currentQ       = 0;
        score          = 0;
        wrongQuestions = [];
        userAnswers    = new Array(questions.length).fill(-1); // -1 = unanswered

        // Begin the quiz!
        startTimer();
        updateScoreDisplay();
        showScreen('screen-quiz');
        renderQuestion();

      } catch (err) {
        console.error(err);
        alert('Unable to load questions.\nPlease try again.');
      }
    }

    // ═══════════════════════════════════════════════════════════════
    //  RENDER QUESTION — displays the current question on screen
    // ═══════════════════════════════════════════════════════════════
    function renderQuestion() {
      const q = questions[currentQ];

      // Update question counter and progress bar
      document.getElementById('qCounter').textContent = `Question ${currentQ + 1} / ${questions.length}`;
      document.getElementById('quizTitleLabel').textContent = quizTitle;
      const pct = ((currentQ + 1) / questions.length) * 100;
      document.getElementById('progressFill').style.width = pct + '%';

      // Set question text
      document.getElementById('questionText').textContent = q.question;

      // Build option buttons
      const grid = document.getElementById('optionsGrid');
      grid.innerHTML = '';

      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.dataset.index = idx;
        btn.innerHTML = `
          <span class="opt-letter">${LETTERS[idx]}</span>
          <span>${escapeHtml(opt)}</span>`;

        // If user already answered this question, restore state
        if (userAnswers[currentQ] !== -1) {
          btn.classList.add('locked'); // disable re-answering
          const chosen = userAnswers[currentQ];
          if (idx === q.answer) {
            btn.classList.add('correct');   // mark correct answer green
          } else if (idx === chosen) {
            btn.classList.add('wrong');     // mark chosen wrong answer red
          }
        } else {
          // Fresh unanswered — attach click handler
          btn.addEventListener('click', () => handleAnswer(idx));
        }

        grid.appendChild(btn);
      });

      // Show or hide explanation depending on whether answered
      const expBox  = document.getElementById('explanationBox');
      const expText = document.getElementById('explanationText');
      if (userAnswers[currentQ] !== -1) {
        expText.textContent = q.explanation || '';
        expBox.style.display = 'block';
      } else {
        expBox.style.display = 'none';
      }

      // Update Previous / Next buttons
      document.getElementById('prevBtn').disabled = (currentQ === 0);
      const nextBtn = document.getElementById('nextBtn');
      if (currentQ === questions.length - 1) {
        // Last question — show "Finish" button
        nextBtn.textContent = '✓ Finish';
        nextBtn.className = 'nav-btn finish';
        nextBtn.onclick = finishQuiz;
      } else {
        nextBtn.textContent = 'Next →';
        nextBtn.className = 'nav-btn primary';
        nextBtn.onclick = () => navigate(1);
      }
    }

    // ═══════════════════════════════════════════════════════════════
    //  HANDLE ANSWER — processes user clicking an option
    // ═══════════════════════════════════════════════════════════════
    function handleAnswer(selectedIdx) {
      const q = questions[currentQ];

      // Record user's answer
      userAnswers[currentQ] = selectedIdx;

      // Lock all buttons so user cannot re-answer
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.classList.add('locked'));

      // Highlight correct and wrong
      buttons.forEach((btn, idx) => {
        if (idx === q.answer) {
          btn.classList.add('correct');   // always show correct in green
        } else if (idx === selectedIdx) {
          btn.classList.add('wrong');     // highlight wrong choice in red
        }
      });

      // Update score if correct
      if (selectedIdx === q.answer) {
        score++;
        updateScoreDisplay();
      } else {
        // Record this question as a mistake (store full question data)
        wrongQuestions.push({
          ...q,
          userAnswer: selectedIdx
        });
      }

      // Reveal explanation after answering
      document.getElementById('explanationText').textContent = q.explanation || '';
      document.getElementById('explanationBox').style.display = 'block';
    }

    // ═══════════════════════════════════════════════════════════════
    //  NAVIGATION — move to previous or next question
    // ═══════════════════════════════════════════════════════════════
    function navigate(dir) {
      const newIdx = currentQ + dir;
      if (newIdx >= 0 && newIdx < questions.length) {
        currentQ = newIdx;
        renderQuestion();
      }
    }

    // ═══════════════════════════════════════════════════════════════
    //  FINISH QUIZ — stop timer and show results
    // ═══════════════════════════════════════════════════════════════
    function finishQuiz() {
      stopTimer(); // stop the clock

      const total    = questions.length;
      const accuracy = total > 0 ? Math.round((score / total) * 100) : 0;
      const mistakes = total - score;

      // Pick a result emoji based on accuracy
      let emoji = '😔';
      if (accuracy >= 90)      emoji = '🏆';
      else if (accuracy >= 70) emoji = '🎉';
      else if (accuracy >= 50) emoji = '👍';
      else if (accuracy >= 30) emoji = '😐';

      document.getElementById('resultsEmoji').textContent = emoji;
      document.getElementById('resultsSubtitle').textContent = `You scored ${score} out of ${total}`;
      document.getElementById('rScore').textContent    = `${score} / ${total}`;
      document.getElementById('rTime').textContent     = formatTime(elapsedSeconds);
      document.getElementById('rAccuracy').textContent = `${accuracy}%`;
      document.getElementById('rMistakes').textContent = mistakes;

      // Disable export button if no mistakes
      const exportBtn = document.getElementById('exportBtn');
      exportBtn.disabled = (wrongQuestions.length === 0);
      if (wrongQuestions.length === 0) {
        exportBtn.textContent = '✓ No Mistakes!';
      } else {
        exportBtn.textContent = `⬇ Export ${wrongQuestions.length} Mistake${wrongQuestions.length > 1 ? 's' : ''}`;
      }

      // Build mistakes review list
      const mistakesSection = document.getElementById('mistakesSection');
      const mistakesList    = document.getElementById('mistakesList');
      if (wrongQuestions.length > 0) {
        mistakesSection.style.display = 'block';
        mistakesList.innerHTML = wrongQuestions.map(q => `
          <div class="mistake-item">
            <div class="mq">${escapeHtml(q.question)}</div>
            <div class="ma">
              <span class="badge wrong">✗ You: ${escapeHtml(q.options[q.userAnswer])}</span>
              <span class="badge correct">✓ Correct: ${escapeHtml(q.options[q.answer])}</span>
            </div>
            <div class="mex">💡 ${escapeHtml(q.explanation || 'No explanation provided.')}</div>
          </div>`).join('');
      } else {
        mistakesSection.style.display = 'none';
      }

      showScreen('screen-results');
    }

    // ═══════════════════════════════════════════════════════════════
    //  EXPORT MISTAKES — downloads mistakes as a JSON file
    // ═══════════════════════════════════════════════════════════════
    function exportMistakes() {
      if (wrongQuestions.length === 0) return;

      // Build an exportable JSON structure compatible with the quiz loader
      const exportData = {
        title: `${quizTitle} — Mistakes`,
        questions: wrongQuestions.map(q => ({
          question:    q.question,
          options:     q.options,
          answer:      q.answer,
          explanation: q.explanation
        }))
      };

      // Convert to JSON string with nice formatting
      const jsonStr  = JSON.stringify(exportData, null, 2);
      const blob     = new Blob([jsonStr], { type: 'application/json' });
      const url      = URL.createObjectURL(blob);

      // Trigger browser download
      const a       = document.createElement('a');
      a.href        = url;
      a.download    = `${quizFileName}_mistakes.json`; // e.g. grammar_mistakes.json
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ═══════════════════════════════════════════════════════════════
    //  RETAKE QUIZ — restart current quiz from scratch
    // ═══════════════════════════════════════════════════════════════
    function retakeQuiz() {
      currentQ       = 0;
      score          = 0;
      wrongQuestions = [];
      userAnswers    = new Array(questions.length).fill(-1);

      startTimer();
      updateScoreDisplay();
      showScreen('screen-quiz');
      renderQuestion();
    }

    // ═══════════════════════════════════════════════════════════════
    //  GO HOME — return to quiz selection screen
    // ═══════════════════════════════════════════════════════════════
    function goHome() {
      stopTimer();
      showScreen('screen-home');
    }

    // ─── Confirm exit mid-quiz ────────────────────────────────────
    function confirmExit() {
      if (confirm('Exit the quiz? Your progress will be lost.')) {
        goHome();
      }
    }

    // ─── Safety HTML escaping helpers ─────────────────────────────
    // Prevents XSS if quiz JSON contains special characters
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Escapes for use inside HTML attribute values
    function escapeAttr(str) {
      return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    // ─── Auto-load quiz list on page open ─────────────────────────
    window.onload = function() {
      showScreen('screen-home');
      loadQuizList(); // automatically load available quizzes
    };

  </script>
</body>
</html>
