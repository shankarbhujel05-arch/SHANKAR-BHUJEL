<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engineering MCQs — Shankar Bhujel</title>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']], displayMath: [['\\[', '\\]'], ['$$', '$$']] },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
    };
  </script>

  <style>
    /* =============================================
       PORTFOLIO-MATCHED THEME (Dark Mode)
       ============================================= */
    :root {
      --bg: #0d1117;           /* Main Portfolio BG */
      --surface: #161b22;     /* Card BG */
      --surface2: #1e2733;
      --border: #2d3748;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #e8a045;      /* Gold Accent */
      --accent2: #4a9eff;     /* Blue Accent */
      --correct: #238636;
      --wrong: #da3633;
      --unanswered: #d29922;
      --nav-size: 36px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* HEADER */
    #header {
      background: rgba(13, 17, 23, 0.95);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }

    #header h1 { font-size: 1.1rem; color: var(--accent); font-family: serif; }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .back-link:hover { color: var(--accent); }

    /* PROGRESS */
    #progressRow { flex: 1; display: flex; align-items: center; gap: 10px; max-width: 400px; }
    #progressBar { flex: 1; height: 6px; background: var(--surface2); border-radius: 10px; overflow: hidden; }
    #progressFill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.4s; }

    /* BUTTONS */
    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    #langBtn { background: var(--surface2); color: var(--accent2); border-color: var(--accent2); }
    #submitBtn { background: var(--accent); color: var(--bg); border: none; }
    #submitBtn:hover { transform: translateY(-1px); opacity: 0.9; }

    /* MAIN LAYOUT */
    #main { display: flex; height: calc(100vh - 65px); }

    #questionArea { flex: 1; padding: 25px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
    #qNumber { background: var(--accent2); color: #fff; padding: 2px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
    #qText { font-size: 1.1rem; line-height: 1.6; color: #fff; margin-bottom: 10px; }

    /* OPTIONS */
    #optionsList { display: grid; gap: 10px; }
    .option-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 15px;
      border-radius: 8px;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.2s;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--accent2); background: var(--surface2); }
    .option-letter { width: 24px; height: 24px; background: var(--surface2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }

    .option-btn.correct { border-color: var(--correct); background: rgba(35, 134, 54, 0.1); }
    .option-btn.wrong { border-color: var(--wrong); background: rgba(218, 54, 51, 0.1); }

    /* EXPLANATION */
    #explanationBox { background: var(--surface2); border-left: 4px solid var(--accent2); padding: 15px; border-radius: 4px; display: none; }

    /* NAV PANEL */
    #navPanel { width: 180px; background: var(--surface); border-left: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    #navGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .nav-q-btn { 
        width: 100%; height: 40px; background: var(--bg); border: 1px solid var(--border); 
        color: var(--text); border-radius: 4px; cursor: pointer; font-size: 0.8rem;
    }
    .nav-q-btn.active { border-color: var(--accent); color: var(--accent); }
    .nav-q-btn.nav-correct { background: var(--correct); color: white; border: none; }
    .nav-q-btn.nav-wrong { background: var(--wrong); color: white; border: none; }

    /* MOBILE ADAPTATION */
    @media (max-width: 768px) {
      #main { flex-direction: column; }
      #navPanel { width: 100%; height: auto; border-left: none; border-top: 1px solid var(--border); }
      #navGrid { display: flex; overflow-x: auto; padding-bottom: 10px; }
      .nav-q-btn { min-width: 40px; }
    }
  </style>
</head>
<body>

<div id="header">
  <a href="../index.html" class="back-link">← Portfolio</a>
  <h1>Engineering MCQ</h1>
  <div id="progressRow">
    <div id="progressBar"><div id="progressFill" style="width:0%"></div></div>
  </div>
  <button id="langBtn" class="btn" onclick="toggleLanguage()">नेपाली</button>
  <button id="submitBtn" class="btn" onclick="submitQuiz()">Submit</button>
</div>

<div id="main">
  <div id="questionArea">
    <div><span id="qNumber">Q1</span></div>
    <div id="qText">Loading question...</div>
    <div id="optionsList">
      <button class="option-btn" onclick="selectOption(0)"><span class="option-letter">A</span><span id="opt0"></span></button>
      <button class="option-btn" onclick="selectOption(1)"><span class="option-letter">B</span><span id="opt1"></span></button>
      <button class="option-btn" onclick="selectOption(2)"><span class="option-letter">C</span><span id="opt2"></span></button>
      <button class="option-btn" onclick="selectOption(3)"><span class="option-letter">D</span><span id="opt3"></span></button>
    </div>
    <div id="explanationBox">
      <strong style="color:var(--accent2); display:block; margin-bottom:5px;">EXPLANATION</strong>
      <span id="explanationText"></span>
    </div>
    <div style="margin-top:auto; display:flex; justify-content:space-between;">
        <button class="btn" id="prevBtn" onclick="goTo(currentIndex - 1)">← Prev</button>
        <button class="btn" id="nextBtn" onclick="goTo(currentIndex + 1)">Next →</button>
    </div>
  </div>

  <div id="navPanel">
    <div style="font-size:0.7rem; color:var(--muted); font-weight:bold; text-transform:uppercase;">Question Map</div>
    <div id="navGrid"></div>
  </div>
</div>
